substitutions:
  device_name: desktop-table
  friendly_name: Desktop Table
  pulse_time: 100ms

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  project:
    name: felipe.desktop_table
    version: "1.0.0"

esp8266:
  board: d1_mini
  restore_from_flash: true

logger:
  level: INFO

api:
  encryption:
    key: "rgQNGSbakR8QyJjjvHQt+TtFGGHB5aaLG35L/hVave8="
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: "03e08a79ba51ce67902224babbf189ca"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  fast_connect: true
  ap:
    ssid: "Desktop-Table Fallback Hotspot"
    password: "9JJpEXzMeNYt"

captive_portal:

switch:
  - platform: gpio
    pin: D1
    id: relay1
    restore_mode: ALWAYS_ON
    name: "Desktop table position 3 top"
    icon: "mdi:desk"
    on_turn_off:
      - delay: ${pulse_time}
      - switch.turn_on: relay1

  - platform: gpio
    pin: D2
    id: relay2
    restore_mode: ALWAYS_ON
    name: "Desktop table position 2 stand"
    icon: "mdi:desk"
    on_turn_off:
      - delay: ${pulse_time}
      - switch.turn_on: relay2
