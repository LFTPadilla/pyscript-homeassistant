substitutions:
  device_name: espdesktop
  friendly_name: ESPDesktop

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

logger:
  level: INFO
  logs:
    sensor: INFO
    binary_sensor: INFO
    i2c: WARN

api:
  encryption:
    key: "GGEDuR71cTn7HWG5dHxL72zTa81MEiNYiXfl4Xub9nk="

ota:
  - platform: esphome
    password: "acd9a308255595a3bf4e2ffe7d800f63"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Espdesktop Fallback Hotspot"
    password: "hcf96z4ymNK1"

captive_portal:

uart:
  rx_pin: GPIO44
  baud_rate: 9600

i2c:
  - id: i2c_1
    sda: GPIO5
    scl: GPIO6
    scan: true

binary_sensor:
  - platform: gpio
    pin: GPIO13
    name: "PIR Sensor"
    id: pir_motion_sensor
    device_class: motion

switch:
  - platform: gpio
    pin: GPIO20
    id: relay1
    name: "Desktop table 2 position (standup)"
    icon: "mdi:desk"
    restore_mode: ALWAYS_ON
    # Pulse behavior:
    # - Relay idle state is ON.
    # - Turning this switch OFF creates a short button press.
    # - It auto-returns to ON after 100ms.
    on_turn_off:
      - delay: 100ms
      - switch.turn_on: relay1

  - platform: gpio
    pin: GPIO21
    id: relay2
    name: "Desktop table 3 position (highest)"
    icon: "mdi:desk"
    restore_mode: ALWAYS_ON
    # Same pulse behavior as relay1.
    on_turn_off:
      - delay: 100ms
      - switch.turn_on: relay2

sensor:
  - platform: pmsx003
    type: PMSX003
    pm_1_0:
      name: "PM <1.0um"
      id: pm_1
    pm_2_5:
      name: "PM <2.5um"
      id: pm_2_5
    pm_10_0:
      name: "PM <10um"
      id: pm_10

  - platform: aht10
    variant: AHT20
    address: 0x38
    update_interval: 30s
    temperature:
      name: "AHT Temperature"
      id: ath_temperature
    humidity:
      name: "AHT Humidity"
      id: ath_humidity

  - platform: bmp280_i2c
    address: 0x77
    update_interval: 30s
    temperature:
      name: "BMP Temperature"
      id: bmp280_temperature
    pressure:
      name: "BMP Pressure"
      id: bmp280_pressure

  - platform: ens160_i2c
    i2c_id: i2c_1
    address: 0x53
    update_interval: 30s
    eco2:
      name: "ENS160 eCO2"
    tvoc:
      name: "ENS160 Total Volatile Organic Compounds"
    aqi:
      id: ens160_air_quality_index
      name: "ENS160 Air Quality Index"
    compensation:
      temperature: ath_temperature
      humidity: ath_humidity
