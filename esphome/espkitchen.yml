esphome:
  name: espkitchen
  friendly_name: ESPKitchen

esp32:
  board: esp32-s2-saola-1
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "/sJxvOy86UlbDp1wHYf3OL2pXK4fUg9E3d846c//AmA="

ota:
  - platform: esphome
    password: "9fed056c9d74625ef0d85486c12c607e"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Espkitchen Fallback Hotspot"
    password: "xnlRUqXBCYuz"

spi:
  miso_pin: GPIO35
  clk_pin: GPIO33


binary_sensor:
  - platform: gpio
    pin: GPIO01
    name: "Kitchen motion PIR Sensor"
    id: pir_kitchen_motion_sensor
    device_class: motion
    

sensor:
  - platform: max6675
    name: "** Water Temperature Sensor"
    cs_pin: GPIO37
    update_interval: 30s


  - platform: dht
    pin: GPIO16
    temperature:
      name: "Kitchen room Temperature"
      id: living_room_temperature
    humidity:
      name: "Kitchen room Humidity"
      id: living_room_humidity
    update_interval: 60s

  - platform: pulse_counter
    id: water_h_flow
    pin: GPIO14
    name: "Water H Flow"
    unit_of_measurement: "L/min"
    accuracy_decimals: 2
    filters:
    - lambda: return (x / 400.0)* 0.6848; #Flow pulse: F=(6.68Q)±5% with Q=L/min | Calibrated 2026-03-19: factor adjusted from 0.7064 to 0.6848 (3.15% correction)
    # filters:
    #   # Adjust the pulses per liter based on your flow sensor's specifications
    #   - multiply: 0.1
    total:
      name: "Total Water Flow"
    update_interval: 30s

  - platform: integration
    device_class: water
    state_class: total_increasing
    name: "Water H m³"
    unit_of_measurement: 'm³'
    accuracy_decimals: 4
    sensor: water_h_flow
    time_unit: min
    icon: "mdi:water"
    filters:
        - lambda: return (x / 1000);

  
  - platform: integration
    device_class: water
    state_class: total_increasing
    name: "Water H liters"
    unit_of_measurement: 'L'
    accuracy_decimals: 2
    sensor: water_h_flow
    time_unit: min
    icon: "mdi:water"



captive_portal:
    